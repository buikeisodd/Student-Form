<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Admission Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Roboto;
        line-height: 1.5;
        padding: 20px;
        background-color: #f4f4f9;
      }

      form {
        display: flex;
        flex-direction: column;
        max-width: 40%;
        background-color: white;
        padding: 10px 30px;
        border-radius: 8px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      }

      fieldset {
        max-width: 100%;
        border: 1px solid #ddd;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 5px;
      }

      legend {
        font-weight: bold;
        padding: 0 10px;
        color: rgb(51, 51, 51);
      }

      label {
        display: block;
        margin-top: 10px;
        font-weight: 500;
      }

      button {
        background-color: rgb(57, 160, 57);
        border-radius: 5px;
        border: none;
        width: 100%;
        padding: 8px;
        color: azure;
        font-size: 14px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="tel"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      label[for="male"],
      label[for="female"],
      label[for="library"],
      label[for="accommodation"],
      label[for="sports"] {
        display: inline;
        padding: 0 4px;
        line-height: 50px;
      }

      button:hover {
        cursor: pointer;
        background-color: rgb(57, 202, 57);
        padding: 10px;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
    </style>
  </head>
  <body>
    <header></header>
    <main>
      <form action="#" method="POST">
        <!-- Hero Section -->
        <h1>Student Admission Form</h1>
        <p>
          Please fill out the form below to register for the upcoming semester
        </p>
        <!-- Person Info Section -->
        <section>
          <fieldset>
            <legend>Personal Information</legend>

            <div>
              <label for="full-name"> Full Name </label>
              <input
                type="text"
                id="full-name"
                name="student_name"
                placeholder="e.g. John Doe"
                required
              />

              <label for="email-address"> Email Address </label>
              <input
                type="email"
                name="student_email"
                id="email-address"
                placeholder="john@example.com"
                required
              />

              <label for="user-password"> Password </label>
              <input
                type="password"
                id="user-password"
                name="student_password"
                required
              />

              <label for="phone"> Phone Number </label>
              <input
                type="tel"
                name="student_phone"
                id="phone"
                placeholder="123-456-7890"
                required
              />

              <label for="dob"> Date of Birth </label>
              <input type="date" id="dob" name="student_dob" required />
            </div>
          </fieldset>
        </section>
        <!-- Academic Choices Section -->
        <section>
          <fieldset>
            <legend>Academic Choices</legend>

            <div>
              <label> Gender </label>

              <input type="radio" id="male" value="male" name="gender" /><label
                for="male"
                >Male</label
              >
              <input
                type="radio"
                id="female"
                value="female"
                name="gender"
              /><label for="female">Female</label>

              <label for="course-select"> Desired Course </label>

              <select name="course" id="course-select" required>
                <option value="">---Please choose a course---</option>
                <option value="software-eng">Software Engineering</option>
                <option value="data-analysis">Data Analysis</option>
                <option value="cybersec">CyberSecurity</option>
              </select>

              <label> Campus Facilities Needed </label>

              <input
                type="checkbox"
                name="facility"
                id="library"
                value="library"
              />
              <label for="library">Library Access</label>
              <input
                type="checkbox"
                name="facility"
                id="hostel"
                value="hostel"
              />
              <label for="accommodation">Accommodation</label>
              <input
                type="checkbox"
                name="facility"
                id="sports"
                value="sports"
              />
              <label for="sports">Sports Complex</label>
            </div>
          </fieldset>
        </section>

        <!-- Additional Details Section -->
        <section>
          <fieldset>
            <legend>Additional Details</legend>

            <div style="display: flex; flex-direction: column">
              <label for="additional-details"
                >Why do you want to join this campus?</label
              >
              <textarea
                id="additional-details"
                name="additional_details"
                cols="8"
                rows="4"
                placeholder="Tell us about your goals..."
              ></textarea>
            </div>
          </fieldset>
        </section>

        <!-- Submit Button Section -->
        <section>
          <button type="submit">Submit Application</button>
        </section>
      </form>
    </main>
  </body>
</html>
